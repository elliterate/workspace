- name: Position dock on bottom of display
  community.general.osx_defaults:
    domain: com.apple.dock
    key: orientation
    type: string
    value: bottom
- name: Auto-hide dock
  community.general.osx_defaults:
    domain: com.apple.dock
    key: autohide
    type: bool
    value: true
- name: Configure dock tile size
  community.general.osx_defaults:
    domain: com.apple.dock
    key: tilesize
    type: int
    value: 65
- name: Disable dock icon magnification
  community.general.osx_defaults:
    domain: com.apple.dock
    key: magnification
    type: bool
    value: false
- name: New Finder window defaults to home folder
  community.general.osx_defaults:
    domain: com.apple.finder
    key: NewWindowTarget
    type: string
    value: PfHm
- name: Use function keys as function keys
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: com.apple.keyboard.fnState
    type: bool
    value: true
- name: Enable full keyboard access for all controls
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: AppleKeyboardUIMode
    type: int
    value: 3
- name: Set fastest key repeat
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: KeyRepeat
    type: int
    value: 1 # lower is faster
- name: Set shortest initial key repeat delay
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: InitialKeyRepeat
    type: int
    value: 15 # lower is shorter
- name: Don't automatically correct spelling
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticSpellingCorrectionEnabled
    type: bool
    value: false
- name: Don't automatically capitalize
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticCapitalizationEnabled
    type: bool
    value: false
- name: Don't automatically substitute dashes
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticDashSubstitutionEnabled
    type: bool
    value: false
- name: Don't automatically substitute periods
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticPeriodSubstitutionEnabled
    type: bool
    value: false
- name: Don't automatically substitute quotes
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticQuoteSubstitutionEnabled
    type: bool
    value: false
- name: Set tap behavior to "click"
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: com.apple.mouse.tapBehavior
    type: int
    value: 1
- name: Enable built-in trackpad tap-to-click
  community.general.osx_defaults:
    domain: com.apple.AppleMultitouchTrackpad
    key: Clicking
    type: bool
    value: true
- name: Enable external trackpad tap-to-click
  community.general.osx_defaults:
    domain: com.apple.driver.AppleBluetoothMultitouch.trackpad
    key: Clicking
    type: bool
    value: true
- name: Enable scroll gesture with modifier keys to zoom
  community.general.osx_defaults:
    domain: com.apple.universalaccess
    key: closeViewScrollWheelToggle
    type: bool
    value: true
- name: Disable swipe navigation
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: AppleEnableSwipeNavigateWithScrolls
    type: bool
    value: false
- name: Disable some default keyboard shortcuts
  community.general.osx_defaults:
    domain: pbs
    key: NSServicesStatus
    type: dict
    dict_mode: add
    value:
      # CMD-SHIFT-L
      "com.apple.Safari - Search With %WebSearchProvider@ - searchWithWebSearchProvider": &disabled_keyboard_shortcut_xml |
        <dict>
          <key>enabled_context_menu</key>
          <false/>
          <key>enabled_services_menu</key>
          <false/>
          <key>presentation_modes</key>
          <dict>
            <key>ContextMenu</key>
            <false/>
            <key>ServicesMenu</key>
            <false/>
          </dict>
        </dict>
      # CMD-SHIFT-A
      "com.apple.Terminal - Search man Page Index in Terminal - searchManPages": *disabled_keyboard_shortcut_xml
- name: Always show tab bar in Safari
  community.general.osx_defaults:
    domain: com.apple.Safari
    key: AlwaysShowTabBar
    type: bool
    value: true
- name: Don't autofill credit cards in Safari
  community.general.osx_defaults:
    domain: com.apple.Safari
    key: AutoFillCreditCardData
    type: bool
    value: false
- name: Don't autofill passwords in Safari
  community.general.osx_defaults:
    domain: com.apple.Safari
    key: AutoFillPasswords
    type: bool
    value: false
- name: Don't auto-open safe downloads in Safari
  community.general.osx_defaults:
    domain: com.apple.Safari
    key: AutoOpenSafeDownloads
    type: bool
    value: false
- name: Ask for password when screen is locked
  community.general.osx_defaults:
    domain: com.apple.screensaver
    key: askForPassword
    type: int
    value: 1
- name: Ask for password immediately
  community.general.osx_defaults:
    domain: com.apple.screensaver
    key: askForPasswordDelay
    type: float
    value: 0
- name: Disable rich text in new TextEdit documents
  community.general.osx_defaults:
    domain: com.apple.TextEdit
    key: RichText
    type: bool
    value: false
- name: Disable text replacement in new TextEdit documents
  community.general.osx_defaults:
    domain: com.apple.TextEdit
    key: TextReplacement
    type: bool
    value: false
- name: Set global Zoom "Toggle Audio" shortcut to CTRL-OPT-CMD-A
  community.general.osx_defaults:
    domain: us.zoom.xos.HotKey
    key: "[HK@combo]-HotkeyOnOffAudio"
    type: dict
    value:
      "hot key code": 0
      "hot key modifier": 1835008
- name: Set global Zoom "Toggle Video" shortcut to CTRL-OPT-CMD-V
  community.general.osx_defaults:
    domain: us.zoom.xos.HotKey
    key: "[HK@combo]-HotkeyOnOffVideo"
    type: dict
    value:
      "hot key code": 9
      "hot key modifier": 1835008
